<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo_productos.css') }}">
</head>
<body>
    <div class="contenedor-body">
        <div class="navbar">
            <!-- IZQUIERDA -->
            <div class="nav-left">
                <div class="icon icon-menu">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="logo">GroseryApp</div>
                <div class="icono-logo"> <img src="{{ url_for('static', filename='logo app/LogoApp.png') }}" alt="Logo"></div>
            </div>

            <!-- CENTRO -->
            <div class="nav-center">
                <a href="#"></a><input type="text" placeholder="Buscar productos...">
            </div>
            <!-- DERECHA -->
            <div class="nav-right">
                <div class="menu">
                    <a href="{{ url_for('productos') }}" class="active">Productos</a>
                    <a href="{{ url_for('Categorias') }}">Categorias</a>                    
                    <a href="{{ url_for('Pedidos') }}">Pedidos</a>
                </div>
                <div class="icons">
                    <a href="#"><i class="fas fa-shopping-cart"></i></a>
                    <a href="{{ url_for('dashb') }}"><i class="fas fa-user-circle"></i></a>
                </div>
            </div>
        </div>
        <main></main>
        <!-- Contenedor anuncios -->
        <div class="contenedor-anuncios">
            <div>
                <div class="carrusel-box">
                    <ul>
                        <li>
                            <img src="{{ url_for('static', filename='logo app/anuncio-postobon.jpg') }}" alt="Anucio postobon">
                        </li>
                        <li>
                            <img src="{{ url_for('static', filename='logo app/anuncio-papas-margaritas.jpg_large') }}" alt="Anuncio papas margaritas">
                        </li>
                        <li>
                            <img src="{{ url_for('static', filename='logo app/anuncio-cocola.png') }}" alt="Anuncio cocacola">
                        </li>
                        <li>
                            <img src="{{ url_for('static', filename='logo app/anuncio-alqueria.jpeg') }}" alt="Anuncio alqueria">
                        </li>
                    </ul>
                </div>
            </div>
            <div>
                <div class="anuncio-dos">
                    <img src="{{ url_for('static', filename='logo app/anuncio pinpop.png') }}" alt="Anuncio Pinpop">
                </div>
            </div>
        </div>

        <div class="contenido">
            <!-- Contenedor productos -->
            <div class="contenedor-productos">
                {% for producto in productos %}
                <div class="items">
                    <figure>
                        <img id="itm" src="{{ producto[3] }}" alt="{{ producto[1] }}">
                    </figure>
                    <div class="informacion-producto">
                        <h2>{{ producto[1] }}</h2>
                        <p class="precio">${{ producto[2] }} COP</p>
                        <a href="{{ url_for('producto', id_Productos=producto[0]) }}"><button>Detalles</button></a>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="footer">
            <a href="#">Soporte</a>
            <a href="#">Protección de datos</a>
            <a href="#">Ayuda</a>
            <a href="#">Términos y Condiciones</a>
            <a href="#">¿Quiénes somos?</a>
        </div>
    </div>
</body>
</html>
